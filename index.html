<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Implementation Dashboard</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for compiling JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ============================================================================
        // PASTE YOUR CSV DATA HERE IF YOU ARE OPENING THIS LOCALLY WITHOUT A SERVER
        // ============================================================================
        const csvData = `"Subject","Step Number","Phase","Description","Status"
"Social Studies","1","Curriculum & UbD Training","Engaging in foundational training on the new curriculum expectations and the Understanding by Design framework.","0"
"Social Studies","2","Framework Alignment & Tool Vetting","Introducing planning tools and establishing evaluation criteria based on the training.","0"
"Social Studies","3","Macro-Level Unit Planning","Determining pacing, sequence, and overarching unit structure.","0"
"Social Studies","4","Initial Unit Drafting","Collaboratively developing transfer goals and an assessment plan for the first unit(s).","0"
"Social Studies","5","Resource Gathering & Exploration","Compiling, creating, and curating supporting resources.","0"
"Social Studies","6","Consolidation & Streamlining","Reviewing multiple unit versions, making choices to trim down, and finalizing assessment plans.","0"
"Social Studies","7","Micro-Level Lesson Build-Out","Folding developed units and gathered resources into specific, day-to-day lesson plans.","0"
"Social Studies","8","Scaling & Progression","Prioritizing and developing supporting resources.","0"
"Social Studies","9","Resource Hub Consolidation","Finalizing the curated list of resources and uploading them to the resource hub for teacher access, including the unit plans and supporting documents.","0"
"Social Studies","10","Launch Preparation","Generating a list of logistical and material needs for a smooth rollout.","0"
"Social Studies","Goal","Final September Goal","First unit for grade 7 completed.",""
"Career Education and Financial Literacy (CEFL)","1","Curriculum & UbD Training","Engaging in foundational training on the new curriculum expectations and the Understanding by Design framework.","0"
"Career Education and Financial Literacy (CEFL)","2","Framework Alignment & Tool Vetting","Introducing planning tools and establishing evaluation criteria based on the training.","0"
"Career Education and Financial Literacy (CEFL)","3","Macro-Level Unit Planning","Determining pacing, sequence, and overarching unit structure.","0"
"Career Education and Financial Literacy (CEFL)","4","Initial Unit Drafting","Collaboratively developing transfer goals and an assessment plan for the first unit(s).","0"
"Career Education and Financial Literacy (CEFL)","5","Resource Gathering & Exploration","Compiling, creating, and curating supporting resources.","0"
"Career Education and Financial Literacy (CEFL)","6","Consolidation & Streamlining","Reviewing multiple unit versions, making choices to trim down, and finalizing assessment plans.","0"
"Career Education and Financial Literacy (CEFL)","7","Micro-Level Lesson Build-Out","Folding developed units and gathered resources into specific, day-to-day lesson plans.","0"
"Career Education and Financial Literacy (CEFL)","8","Scaling & Progression","Prioritizing and developing supporting resources.","0"
"Career Education and Financial Literacy (CEFL)","9","Resource Hub Consolidation","Finalizing the curated list of resources and uploading them to the resource hub for teacher access, including the unit plans and supporting documents.","0"
"Career Education and Financial Literacy (CEFL)","10","Launch Preparation","Generating a list of logistical and material needs for a smooth rollout.","0"
"Career Education and Financial Literacy (CEFL)","Goal","Final September Goal","First unit for grades 7, 8, and 9 completed.",""`;

        // --- INLINE ICON COMPONENTS ---
        const IconSVG = ({ children, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const CalendarIcon = ({className}) => <IconSVG className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></IconSVG>;
        const ClockIcon = ({className}) => <IconSVG className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></IconSVG>;
        const SnowflakeIcon = ({className}) => <IconSVG className={className}><line x1="2" y1="12" x2="22" y2="12"></line><line x1="12" y1="2" x2="12" y2="22"></line><line x1="20" y1="16" x2="4" y2="8"></line><line x1="20" y1="8" x2="4" y2="16"></line></IconSVG>;
        const ThermometerIcon = ({className}) => <IconSVG className={className}><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"></path></IconSVG>;
        const ThermometerSunIcon = ({className}) => <IconSVG className={className}><path d="M12 9a4 4 0 0 0-2 7.5"></path><path d="M12 3v2"></path><path d="M6.6 18.4l-1.4 1.4"></path><path d="M20 4l-1.4 1.4"></path><path d="M4 22l1.4-1.4"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"></path></IconSVG>;
        const FlameIcon = ({className}) => <IconSVG className={className}><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"></path></IconSVG>;
        const CheckCircleIcon = ({className}) => <IconSVG className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></IconSVG>;
        const CircleIcon = ({className}) => <IconSVG className={className}><circle cx="12" cy="12" r="10"></circle></IconSVG>;
        const PlayCircleIcon = ({className}) => <IconSVG className={className}><circle cx="12" cy="12" r="10"></circle><polygon points="10 8 16 12 10 16 10 8"></polygon></IconSVG>;
        const ChevronDownIcon = ({className}) => <IconSVG className={className}><polyline points="6 9 12 15 18 9"></polyline></IconSVG>;
        const ChevronUpIcon = ({className}) => <IconSVG className={className}><polyline points="18 15 12 9 6 15"></polyline></IconSVG>;

        // --- DEFAULT DATA ---
        const defaultMilestones = [
            { step: 1, phase: "Curriculum & UbD Training", description: "Engaging in foundational training on the new curriculum expectations and the Understanding by Design framework.", status: 0 },
            { step: 2, phase: "Framework Alignment & Tool Vetting", description: "Introducing planning tools and establishing evaluation criteria based on the training.", status: 0 },
            { step: 3, phase: "Macro-Level Unit Planning", description: "Determining pacing, sequence, and overarching unit structure.", status: 0 },
            { step: 4, phase: "Initial Unit Drafting", description: "Collaboratively developing transfer goals and an assessment plan for the first unit(s).", status: 0 },
            { step: 5, phase: "Resource Gathering & Exploration", description: "Compiling, creating, and curating supporting resources.", status: 0 },
            { step: 6, phase: "Consolidation & Streamlining", description: "Reviewing multiple unit versions, making choices to trim down, and finalizing assessment plans.", status: 0 },
            { step: 7, phase: "Micro-Level Lesson Build-Out", description: "Folding developed units and gathered resources into specific, day-to-day lesson plans.", status: 0 },
            { step: 8, phase: "Scaling & Progression", description: "Prioritizing and developing supporting resources.", status: 0 },
            { step: 9, phase: "Resource Hub Consolidation", description: "Finalizing the curated list of resources and uploading them to the resource hub for teacher access, including the unit plans and supporting documents.", status: 0 },
            { step: 10, phase: "Launch Preparation", description: "Generating a list of logistical and material needs for a smooth rollout.", status: 0 }
        ];

        function App() {
            const [subjects, setSubjects] = useState([]);
            const [now, setNow] = useState(new Date());
            const [expandedSubject, setExpandedSubject] = useState(null);

            useEffect(() => {
                const timer = setInterval(() => setNow(new Date()), 60000);
                return () => clearInterval(timer);
            }, []);

            const parseCSV = (text) => {
                const lines = text.split('\n').filter(l => l.trim() !== '');
                
                const parsedSubjects = {
                    "Social Studies": { id: 's1', name: "Social Studies", goal: "First unit for grade 7 completed.", milestones: JSON.parse(JSON.stringify(defaultMilestones)) },
                    "Career Education and Financial Literacy (CEFL)": { id: 's2', name: "Career Education and Financial Literacy (CEFL)", goal: "First unit for grades 7, 8, and 9 completed.", milestones: JSON.parse(JSON.stringify(defaultMilestones)) },
                    "Science": { id: 's3', name: "Science", goal: "First unit completed.", milestones: JSON.parse(JSON.stringify(defaultMilestones)) },
                    "Mathematics": { id: 's4', name: "Mathematics", goal: "First unit completed.", milestones: JSON.parse(JSON.stringify(defaultMilestones)) }
                };

                for (let i = 1; i < lines.length; i++) {
                    const match = lines[i].match(/(?:"[^"]*"|[^,]+)/g);
                    if (!match) continue;
                    const cols = match.map(col => col.replace(/^"|"$/g, '').trim());
                    
                    const [subjectName, stepRaw, phase, desc, statusRaw] = cols;
                    if (!subjectName) continue;

                    if (!parsedSubjects[subjectName]) {
                        parsedSubjects[subjectName] = { id: `s_${Date.now()}_${Math.random()}`, name: subjectName, goal: "", milestones: [] };
                    }

                    if (stepRaw && stepRaw.toLowerCase() === 'goal') {
                        parsedSubjects[subjectName].goal = desc;
                    } else if (stepRaw) {
                        const stepNum = parseInt(stepRaw) || stepRaw;
                        const mIndex = parsedSubjects[subjectName].milestones.findIndex(m => m.step === stepNum);
                        
                        if (mIndex >= 0) {
                            parsedSubjects[subjectName].milestones[mIndex].phase = phase || '';
                            parsedSubjects[subjectName].milestones[mIndex].description = desc || '';
                            parsedSubjects[subjectName].milestones[mIndex].status = parseInt(statusRaw) || 0;
                        } else {
                            parsedSubjects[subjectName].milestones.push({
                                step: stepNum,
                                phase: phase || '',
                                description: desc || '',
                                status: parseInt(statusRaw) || 0
                            });
                        }
                    }
                }
                
                const newSubjectsArray = Object.values(parsedSubjects).map(sub => {
                    sub.milestones.sort((a,b) => a.step - b.step);
                    return sub;
                });

                if (newSubjectsArray.length > 0) {
                    setSubjects(newSubjectsArray);
                }
            };

            useEffect(() => {
                const loadCSV = async () => {
                    try {
                        const response = await fetch('./progress.csv');
                        if (!response.ok) throw new Error("File not found via fetch");
                        const text = await response.text();
                        parseCSV(text);
                    } catch (error) {
                        console.log("Using embedded CSV data (Browser local file execution).");
                        parseCSV(csvData);
                    }
                };
                loadCSV();
            }, []);

            const targetDate = new Date('2026-09-01T00:00:00');
            const diffTime = targetDate.getTime() - now.getTime();
            const daysRemaining = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            const formattedDate = now.toLocaleDateString('en-US', { 
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
            });

            const updateMilestone = (subjectId, stepIdx, newStatus) => {
                setSubjects(prev => prev.map(sub => {
                    if (sub.id !== subjectId) return sub;
                    const newMilestones = [...sub.milestones];
                    newMilestones[stepIdx] = { ...newMilestones[stepIdx], status: newStatus };
                    return { ...sub, milestones: newMilestones };
                }));
            };

            const getTemperatureData = (milestones) => {
                const score = milestones.reduce((acc, curr) => acc + curr.status, 0);
                const maxScore = milestones.length * 2;
                const percentage = Math.round((score / maxScore) * 100) || 0;
                
                let colorClass, label, Icon;
                if (percentage < 25) {
                    colorClass = 'text-blue-500 bg-blue-100 border-blue-200';
                    label = 'Cold (Just Started)';
                    Icon = SnowflakeIcon;
                } else if (percentage < 50) {
                    colorClass = 'text-yellow-600 bg-yellow-100 border-yellow-200';
                    label = 'Warming Up';
                    Icon = ThermometerIcon;
                } else if (percentage < 80) {
                    colorClass = 'text-orange-500 bg-orange-100 border-orange-200';
                    label = 'Hot (Making Great Progress)';
                    Icon = ThermometerSunIcon;
                } else {
                    colorClass = 'text-red-600 bg-red-100 border-red-200';
                    label = 'On Fire! (Nearly Complete)';
                    Icon = FlameIcon;
                }

                if (percentage === 100) {
                    colorClass = 'text-green-600 bg-green-100 border-green-200';
                    label = 'Complete!';
                    Icon = CheckCircleIcon;
                }

                return { score, maxScore, percentage, colorClass, label, Icon };
            };

            const totalProjectPercentage = subjects.length > 0 ? Math.round(
                (subjects.reduce((acc, sub) => acc + sub.milestones.reduce((mAcc, m) => mAcc + m.status, 0), 0) / 
                (subjects.length * 20)) * 100
            ) : 0;

            return (
                <div className="min-h-screen font-sans text-slate-800 pb-12">
                    <header className="bg-slate-900 text-white shadow-lg pb-6 pt-8 px-6 md:px-12">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                                <div>
                                    <h1 className="text-3xl md:text-4xl font-bold tracking-tight mb-2">Project Implementation Dashboard</h1>
                                    <p className="text-slate-400 text-lg flex items-center gap-2">
                                        <CalendarIcon className="w-5 h-5" />
                                        {formattedDate}
                                    </p>
                                </div>
                                
                                <div className="bg-slate-800 border border-slate-700 rounded-xl p-4 flex items-center gap-4 shadow-inner">
                                    <div className="bg-indigo-500/20 p-3 rounded-full">
                                        <ClockIcon className="w-8 h-8 text-indigo-400" />
                                    </div>
                                    <div>
                                        <p className="text-slate-300 text-sm font-medium uppercase tracking-wider">Time to Launch</p>
                                        <div className="flex items-baseline gap-2">
                                            <span className={`text-4xl font-extrabold ${daysRemaining < 30 ? 'text-red-400' : 'text-indigo-300'}`}>
                                                {daysRemaining}
                                            </span>
                                            <span className="text-slate-400">days left</span>
                                        </div>
                                        <p className="text-xs text-slate-500">Due: Sept 1, 2026</p>
                                    </div>
                                </div>
                            </div>

                            <div className="mt-8">
                                <div className="flex justify-between text-sm mb-2 font-medium">
                                    <span>Overall Project Completion</span>
                                    <span>{totalProjectPercentage}%</span>
                                </div>
                                <div className="w-full bg-slate-800 rounded-full h-3">
                                    <div className="bg-indigo-500 h-3 rounded-full transition-all duration-1000" style={{ width: `${totalProjectPercentage}%` }}></div>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 md:px-12 mt-8">
                        <h2 className="text-xl font-bold mb-4 text-slate-700 flex items-center gap-2">
                            <ThermometerSunIcon className="w-6 h-6 text-slate-500" />
                            Subject Temperature Checks
                        </h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
                            {subjects.map(subject => {
                                const temp = getTemperatureData(subject.milestones);
                                const Icon = temp.Icon;
                                return (
                                    <div key={`temp-${subject.id}`} className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex flex-col justify-between">
                                        <div>
                                            <h3 className="font-bold text-lg mb-1 leading-tight text-slate-800">{subject.name}</h3>
                                            <p className="text-xs text-slate-500 mb-4 line-clamp-2" title={subject.goal}>{subject.goal || 'No goal set'}</p>
                                        </div>
                                        
                                        <div>
                                            <div className={`inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-bold border mb-4 ${temp.colorClass}`}>
                                                <Icon className="w-4 h-4" />
                                                {temp.label}
                                            </div>
                                            
                                            <div className="flex justify-between items-end mb-2 text-sm font-medium">
                                                <span className="text-slate-600">Score: {temp.score}/{temp.maxScore}</span>
                                                <span className="text-slate-900 font-bold">{temp.percentage}%</span>
                                            </div>
                                            <div className="w-full bg-slate-100 rounded-full h-2">
                                                <div 
                                                    className={`h-2 rounded-full transition-all duration-500 ${temp.percentage === 100 ? 'bg-green-500' : 'bg-current'}`} 
                                                    style={{ width: `${temp.percentage}%`, backgroundColor: temp.percentage < 25 ? '#3b82f6' : temp.percentage < 50 ? '#ca8a04' : temp.percentage < 80 ? '#f97316' : temp.percentage === 100 ? '#22c55e' : '#dc2626' }}
                                                ></div>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>

                        <h2 className="text-xl font-bold mb-4 text-slate-700 flex items-center gap-2">
                            <CheckCircleIcon className="w-6 h-6 text-slate-500" />
                            Milestone Breakdown
                        </h2>
                        <div className="space-y-4">
                            {subjects.map((subject, subIndex) => (
                                <div key={`detail-${subject.id}`} className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                    <button 
                                        onClick={() => setExpandedSubject(expandedSubject === subject.id ? null : subject.id)}
                                        className="w-full p-6 flex items-center justify-between bg-white hover:bg-slate-50 transition text-left"
                                    >
                                        <div className="flex items-center gap-4">
                                            <div className="w-10 h-10 rounded-full bg-indigo-100 text-indigo-700 flex items-center justify-center font-bold">
                                                {subIndex + 1}
                                            </div>
                                            <div>
                                                <h3 className="font-bold text-xl text-slate-800">{subject.name}</h3>
                                                <p className="text-sm text-slate-500">{subject.milestones.filter(m => m.status === 2).length} of {subject.milestones.length} milestones completed</p>
                                            </div>
                                        </div>
                                        {expandedSubject === subject.id ? <ChevronUpIcon className="w-6 h-6 text-slate-400" /> : <ChevronDownIcon className="w-6 h-6 text-slate-400" />}
                                    </button>

                                    {expandedSubject === subject.id && (
                                        <div className="border-t border-slate-100 bg-slate-50 p-6">
                                            <div className="space-y-3">
                                                {subject.milestones.map((milestone, mIndex) => (
                                                    <div key={mIndex} className="bg-white rounded-xl p-4 border border-slate-200 flex flex-col lg:flex-row gap-4 justify-between lg:items-center hover:border-indigo-200 transition shadow-sm">
                                                        
                                                        <div className="flex items-start gap-4 flex-1">
                                                            <div className="min-w-[2.5rem] h-10 bg-slate-100 rounded-lg flex items-center justify-center text-slate-600 font-bold text-sm">
                                                                {milestone.step}
                                                            </div>
                                                            <div>
                                                                <h4 className="font-bold text-slate-800 text-base">{milestone.phase}</h4>
                                                                <p className="text-sm text-slate-500 mt-1 leading-snug">{milestone.description}</p>
                                                            </div>
                                                        </div>

                                                        <div className="flex bg-slate-100 p-1 rounded-lg self-start lg:self-center shrink-0">
                                                            <button 
                                                                onClick={() => updateMilestone(subject.id, mIndex, 0)}
                                                                className={`flex items-center gap-1.5 px-3 py-2 rounded-md text-xs font-bold transition-all ${milestone.status === 0 ? 'bg-white text-slate-700 shadow-sm ring-1 ring-slate-200' : 'text-slate-500 hover:text-slate-700 hover:bg-slate-200/50'}`}
                                                            >
                                                                <CircleIcon className="w-3.5 h-3.5" /> Pending (0)
                                                            </button>
                                                            <button 
                                                                onClick={() => updateMilestone(subject.id, mIndex, 1)}
                                                                className={`flex items-center gap-1.5 px-3 py-2 rounded-md text-xs font-bold transition-all ${milestone.status === 1 ? 'bg-blue-500 text-white shadow-sm ring-1 ring-blue-600' : 'text-slate-500 hover:text-blue-600 hover:bg-slate-200/50'}`}
                                                            >
                                                                <PlayCircleIcon className="w-3.5 h-3.5" /> In Progress (1)
                                                            </button>
                                                            <button 
                                                                onClick={() => updateMilestone(subject.id, mIndex, 2)}
                                                                className={`flex items-center gap-1.5 px-3 py-2 rounded-md text-xs font-bold transition-all ${milestone.status === 2 ? 'bg-green-500 text-white shadow-sm ring-1 ring-green-600' : 'text-slate-500 hover:text-green-600 hover:bg-slate-200/50'}`}
                                                            >
                                                                <CheckCircleIcon className="w-3.5 h-3.5" /> Complete (2)
                                                            </button>
                                                        </div>
                                                        
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
