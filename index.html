<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Progress Dashboard</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .loading-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- SVGs ---
        const CalendarIcon = () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
        const ClockIcon = () => <svg className="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const FlameIcon = () => <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"></path></svg>;

        function App() {
            const [subjects, setSubjects] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [now] = useState(new Date());
            const [expanded, setExpanded] = useState(null);

            const parseCSV = (text) => {
                const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');
                const dataMap = {};

                // Skip header line
                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i];
                    // Robust parser for quoted CSV fields
                    const cols = [];
                    let cur = '';
                    let inQuotes = false;
                    for (let char of line) {
                        if (char === '"') inQuotes = !inQuotes;
                        else if (char === ',' && !inQuotes) {
                            cols.push(cur.trim());
                            cur = '';
                        } else {
                            cur += char;
                        }
                    }
                    cols.push(cur.trim());

                    const [subject, stepRaw, phase, description, statusRaw] = cols;
                    if (!subject) continue;

                    if (!dataMap[subject]) {
                        dataMap[subject] = { name: subject, goal: "", milestones: [] };
                    }

                    if (stepRaw && stepRaw.toLowerCase() === 'goal') {
                        dataMap[subject].goal = description;
                    } else {
                        const stepNum = parseInt(stepRaw);
                        if (!isNaN(stepNum)) {
                            dataMap[subject].milestones.push({
                                step: stepNum,
                                phase: phase || '',
                                desc: description || '',
                                status: parseInt(statusRaw) || 0
                            });
                        }
                    }
                }

                const finalData = Object.values(dataMap).map(sub => {
                    sub.milestones.sort((a, b) => a.step - b.step);
                    return sub;
                });

                if (finalData.length === 0) throw new Error("CSV parsed but no subject data found.");
                setSubjects(finalData);
                setLoading(false);
            };

            const loadData = async () => {
                try {
                    setLoading(true);
                    // Fetch with timestamp to bypass GitHub Pages/Browser caching
                    const response = await fetch(`./progress.csv?v=${Date.now()}`);
                    if (!response.ok) throw new Error(`Could not find progress.csv (Status ${response.status})`);
                    const text = await response.text();
                    parseCSV(text);
                } catch (err) {
                    console.error(err);
                    setError(err.message);
                    setLoading(false);
                }
            };

            useEffect(() => {
                loadData();
            }, []);

            const targetDate = new Date('2026-09-01T00:00:00');
            const diff = targetDate - now;
            const daysLeft = Math.ceil(diff / (1000 * 60 * 60 * 24));
            const formattedDate = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

            const getStats = (milestones) => {
                const score = milestones.reduce((acc, m) => acc + m.status, 0);
                const max = milestones.length * 2;
                const perc = Math.round((score / max) * 100) || 0;
                
                let theme = { bg: 'bg-blue-100', text: 'text-blue-700', label: 'Pending' };
                if (perc === 100) theme = { bg: 'bg-green-100', text: 'text-green-700', label: 'Completed' };
                else if (perc >= 75) theme = { bg: 'bg-red-100', text: 'text-red-700', label: 'On Fire!' };
                else if (perc >= 40) theme = { bg: 'bg-orange-100', text: 'text-orange-700', label: 'Hot' };
                else if (perc >= 10) theme = { bg: 'bg-yellow-100', text: 'text-yellow-700', label: 'Warming Up' };

                return { score, max, perc, ...theme };
            };

            const totalProgress = subjects.length ? Math.round(
                subjects.reduce((acc, s) => acc + s.milestones.reduce((mAcc, m) => mAcc + m.status, 0), 0) /
                (subjects.reduce((acc, s) => acc + s.milestones.length, 0) * 2) * 100
            ) : 0;

            if (loading) return (
                <div className="min-h-screen flex items-center justify-center bg-slate-900 text-white">
                    <div className="text-center loading-pulse">
                        <div className="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                        <h2 className="text-xl font-bold tracking-widest uppercase">Syncing Live CSV...</h2>
                    </div>
                </div>
            );

            if (error) return (
                <div className="min-h-screen flex items-center justify-center bg-slate-50 p-6">
                    <div className="max-w-md w-full bg-white p-8 rounded-3xl shadow-xl border border-red-100 text-center">
                        <div className="text-red-500 text-5xl mb-4">⚠️</div>
                        <h2 className="text-2xl font-black text-slate-900 mb-2">Sync Failed</h2>
                        <p className="text-slate-500 mb-6">{error}</p>
                        <button onClick={loadData} className="w-full bg-slate-900 text-white py-3 rounded-xl font-bold hover:bg-slate-800 transition">Try Again</button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-20">
                    <header className="bg-slate-900 text-white p-8 md:p-12 shadow-2xl">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-10">
                            <div className="flex-1">
                                <h1 className="text-4xl md:text-5xl font-black mb-4 tracking-tighter leading-none">Project Dashboard</h1>
                                <div className="flex flex-wrap items-center gap-6">
                                    <p className="flex items-center gap-2 text-slate-400 font-medium">
                                        <CalendarIcon /> {formattedDate}
                                    </p>
                                    <div className="flex items-center gap-2 px-3 py-1 bg-green-500/10 border border-green-500/20 text-green-400 rounded-full text-xs font-bold uppercase tracking-widest">
                                        <div className="w-2 h-2 bg-green-400 rounded-full animate-ping"></div>
                                        Live: progress.csv
                                    </div>
                                </div>
                            </div>

                            <div className="bg-slate-800 p-8 rounded-[2.5rem] flex items-center gap-8 border border-slate-700 shadow-2xl min-w-[320px]">
                                <div className="text-indigo-400 bg-indigo-500/10 p-4 rounded-2xl scale-125"><ClockIcon /></div>
                                <div>
                                    <p className="text-[10px] uppercase tracking-[0.3em] text-slate-500 font-black mb-2">Countdown to Launch</p>
                                    <div className="flex items-baseline gap-2 leading-none">
                                        <span className="text-7xl font-black text-indigo-300 tracking-tighter">{daysLeft}</span>
                                        <span className="text-slate-400 font-bold uppercase text-sm tracking-widest">Days</span>
                                    </div>
                                    <p className="text-[10px] text-slate-500 mt-3 font-bold tracking-widest uppercase">Target: Sept 1, 2026</p>
                                </div>
                            </div>
                        </div>

                        <div className="max-w-7xl mx-auto mt-12">
                            <div className="flex justify-between items-end mb-3 font-black text-xs uppercase tracking-widest text-slate-500">
                                <span>Global Scope Completion</span>
                                <span className="text-indigo-400">{totalProgress}%</span>
                            </div>
                            <div className="w-full bg-slate-800 h-5 rounded-full p-1 overflow-hidden">
                                <div className="h-full bg-indigo-500 rounded-full transition-all duration-1000 shadow-[0_0_20px_rgba(99,102,241,0.5)]" style={{ width: `${totalProgress}%` }}></div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-6 mt-16">
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 mb-16">
                            {subjects.map(s => {
                                const stats = getStats(s.milestones);
                                return (
                                    <div key={s.name} className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200 flex flex-col justify-between hover:shadow-2xl hover:-translate-y-1 transition duration-500 group">
                                        <div>
                                            <h3 className="text-2xl font-black text-slate-900 mb-2 leading-none tracking-tight group-hover:text-indigo-600 transition">{s.name}</h3>
                                            <p className="text-[11px] text-slate-400 mb-8 italic leading-relaxed line-clamp-3">"{s.goal || 'Goal undefined'}"</p>
                                        </div>
                                        <div>
                                            <div className={`inline-flex items-center gap-2 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest mb-6 border ${stats.bg} ${stats.text}`}>
                                                <FlameIcon /> {stats.label}
                                            </div>
                                            <div className="flex justify-between text-xs font-black text-slate-500 mb-2 uppercase tracking-tighter">
                                                <span>Score: {stats.score}/{stats.max}</span>
                                                <span className="text-slate-900">{stats.perc}%</span>
                                            </div>
                                            <div className="w-full bg-slate-50 h-5 rounded-full overflow-hidden p-1 border border-slate-100">
                                                <div className="h-full bg-indigo-500 rounded-full transition-all duration-1000 ease-out" style={{ width: `${stats.perc}%` }}></div>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>

                        <div className="space-y-6">
                            <h2 className="text-3xl font-black text-slate-900 mb-8 tracking-tight flex items-center gap-4">
                                <span className="w-3 h-10 bg-indigo-500 rounded-full"></span>
                                Implementation Breakdown
                            </h2>
                            {subjects.map(s => (
                                <div key={s.name} className="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden transition-all duration-500 hover:border-indigo-200">
                                    <button onClick={() => setExpanded(expanded === s.name ? null : s.name)} className="w-full p-10 flex justify-between items-center hover:bg-slate-50 transition group">
                                        <div className="flex items-center gap-8">
                                            <div className="w-16 h-16 bg-slate-900 text-indigo-300 rounded-2xl flex items-center justify-center font-black text-3xl shadow-xl transition group-hover:scale-110 duration-500">
                                                {s.name[0]}
                                            </div>
                                            <div className="text-left">
                                                <h3 className="text-3xl font-black text-slate-900 leading-none mb-2 tracking-tighter">{s.name}</h3>
                                                <div className="flex items-center gap-3">
                                                    <span className="text-[10px] font-black text-indigo-500 uppercase tracking-widest px-3 py-1 bg-indigo-50 rounded-lg">
                                                        {s.milestones.length} Milestones
                                                    </span>
                                                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                                        {s.milestones.filter(m => m.status === 2).length} Completed
                                                    </span>
                                                </div>
                                            </div>
                                        </div>
                                        <div className={`w-12 h-12 rounded-2xl border-2 border-slate-100 flex items-center justify-center transition-all duration-500 ${expanded === s.name ? 'rotate-180 bg-slate-900 border-slate-900 text-white' : 'text-slate-300 group-hover:border-indigo-100 group-hover:text-indigo-400'}`}>
                                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M19 9l-7 7-7-7"></path></svg>
                                        </div>
                                    </button>

                                    {expanded === s.name && (
                                        <div className="p-10 pt-0 bg-slate-50/50 space-y-4">
                                            <div className="h-px bg-slate-100 mb-8"></div>
                                            {s.milestones.map(m => (
                                                <div key={m.step} className="bg-white p-8 rounded-3xl border border-slate-200 flex flex-col md:flex-row items-start md:items-center gap-8 shadow-sm group/item hover:border-indigo-400 transition-all duration-300">
                                                    <div className="w-12 h-12 bg-slate-50 text-slate-300 rounded-2xl flex items-center justify-center font-black shrink-0 border border-slate-100 group-hover/item:bg-indigo-600 group-hover/item:text-white group-hover/item:border-indigo-600 transition-all duration-500">
                                                        {m.step}
                                                    </div>
                                                    <div className="flex-1">
                                                        <h4 className="font-black text-slate-900 leading-tight mb-2 uppercase text-[11px] tracking-widest">{m.phase}</h4>
                                                        <p className="text-slate-500 leading-relaxed text-sm">{m.desc}</p>
                                                    </div>
                                                    <div className="flex gap-2 bg-slate-50 p-2 rounded-2xl w-full md:w-auto border border-slate-100">
                                                        {[0, 1, 2].map(v => (
                                                            <div key={v} className={`flex-1 md:flex-none px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest text-center transition-all duration-500 shadow-sm ${m.status === v ? (v === 2 ? 'bg-green-500 text-white shadow-green-200 shadow-lg' : v === 1 ? 'bg-indigo-500 text-white shadow-indigo-200 shadow-lg' : 'bg-slate-400 text-white') : 'text-slate-300 bg-transparent shadow-none opacity-40'}`}>
                                                                {v === 0 ? 'Pending' : v === 1 ? 'Progress' : 'Done'}
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
